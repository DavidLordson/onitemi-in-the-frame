<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onitemi — In the Frame</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #f5f0e8;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 40px;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #2c1a0e;
      margin-bottom: 8px;
      font-weight: normal;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #7a5c3a;
      letter-spacing: 0.1em;
      margin-bottom: 60px;
      font-style: italic;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 40px;
      justify-content: center;
      max-width: 1200px;
    }

    .frame-link {
      text-decoration: none;
      display: block;
      transition: transform 0.3s ease;
    }

    .frame-link:hover {
      transform: scale(1.03);
    }

    .frame {
      position: relative;
      padding: 14px;
      background:
        linear-gradient(145deg, #b8860b, #ffd700, #8b6914, #daa520, #b8860b);
      box-shadow:
        0 0 0 2px #5c3d00,
        4px 4px 16px rgba(0,0,0,0.45),
        inset 0 0 8px rgba(0,0,0,0.2);
      cursor: pointer;
    }

    .frame::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 2px solid rgba(255,255,255,0.25);
      pointer-events: none;
    }

    .frame img {
      display: block;
      width: 260px;
      height: 320px;
      object-fit: cover;
    }

    .frame .label {
      text-align: center;
      margin-top: 10px;
      font-size: 0.75rem;
      color: #2c1a0e;
      letter-spacing: 0.05em;
      font-style: italic;
    }
  </style>
</head>
<body>

  <h1>Onitemi — In the Frame</h1>
  <p class="subtitle">A collection of 11 poems</p>

  <div class="gallery">

    <a class="frame-link" href="poems/24-years-of-gods-elegance-in-you.html">
      <div class="frame">
        <img src="24 Years of God's Elegance in You.jpg" alt="24 Years of God's Elegance in You" />
        <div class="label">24 Years of God's Elegance in You</div>
      </div>
    </a>

    <!-- More frames will be added here -->

  </div>

</body>
</html>
